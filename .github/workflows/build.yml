name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - run: chmod +x gradlew
    - run: ./gradlew build
    - uses: actions/upload-artifact@v4
      with:
        name: ZalupaReport-mod
        path: build/libs/*.jar
        retention-days: 30
